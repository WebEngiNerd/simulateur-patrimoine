<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mieux comprendre son crédit</title>
  </head>
  <body>
    <header><h1>Simulateur de crédit immobilier</h1></header>
    <main>
      <section id="formulaire">
        <h2>Paramètres du crédit</h2>
        <form id="formulaire-credit">
          <label for="montantDuCredit">Montant du crédit (€)</label>
          <input
            type="number"
            id="montantDuCredit"
            placeholder="240000"
            min="1000"
            step="1"
          />

          <label for="taux">Taux (%)</label>
          <input
            type="number"
            id="taux"
            placeholder="3,75"
            max="10"
            step="0.01"
          />

          <label for="duree">Durée (année(s))</label>
          <input
            type="number"
            id="duree"
            placeholder="25"
            max="30"
            step="1"
            min="1"
          />

          <button type="submit">Simuler</button>
        </form>
      </section>
      <section id="resultats">
        <h2>Résultats</h2>
        <p id="resultat-mensualite"></p>
        <!-- Le tableau et le graphique viendront ici -->
      </section>
    </main>
    <footer>WebEngiNerd</footer>
    <script src="/script.js"></script>
  </body>
</html>
